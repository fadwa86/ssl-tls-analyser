[pytest]
pythonpath = .
testpaths = tests
markers =
    unit: tests hors-ligne, déterministes (défaut, jouables en CI)
    network: nécessite un accès réseau
    integration: scan réel d'une cible externe (opt-in, gardé par TLS_LIVE)
# Lancer la passe CI hors-ligne :  pytest -m "not network and not integration"
# Lancer l'intégration live    :  set TLS_LIVE=1 && pytest -m integration
